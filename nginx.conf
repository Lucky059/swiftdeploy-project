events {}

http {

    resolver 127.0.0.11 valid=30s;

    log_format custom '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request';

    access_log /var/log/nginx/access.log custom;

    server {
        listen 8080;

        proxy_connect_timeout 30;
        proxy_send_timeout 30;
        proxy_read_timeout 30;

        location / {
            proxy_pass http://api:3000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Mode $upstream_http_x_mode;

            add_header X-Deployed-By swiftdeploy always;
        }

        error_page 502 503 504 /error.json;

        location = /error.json {
            default_type application/json;
            return 500 '{"error":"upstream failure","code":"502","service":"api","contact":"admin"}';
        }
    }
}
