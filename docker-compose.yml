services:
  api:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MODE=canary
      - APP_VERSION=1.0.0
      - APP_PORT=3000
    networks:
      - swiftdeploy-net
    volumes:
      - app-logs:/app/logs
    restart: always
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - swiftdeploy-net
    depends_on:
      api:
        condition: service_healthy
    restart: always

  opa:
    image: openpolicyagent/opa:latest
    container_name: swiftdeploy-opa
    command:
      - run
      - --server
      - --log-level=debug
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro
    networks:
      - swiftdeploy-net
    restart: always

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  app-logs: