services:
  api:
    image: lucky059-swiftdeploy:latest
    container_name: swiftdeploy-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MODE=stable
      - APP_VERSION=1.0.0
      - APP_PORT=4000
    networks:
      - swiftdeploy-net
    volumes:
      - app-logs:/app/logs
    restart: always
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    ports:
      - "9090:9090"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - swiftdeploy-net
    depends_on:
      api:
        condition: service_healthy
    restart: always

  opa:
    image: openpolicyagent/opa:latest
    container_name: swiftdeploy-opa
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=error
      - /policies
    volumes:
      - ./policies:/policies:ro
    networks:
      - swiftdeploy-net
    ports:
      - "127.0.0.1:8181:8181"
    restart: always

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  app-logs: